name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q

  docs-fresh:
    name: Docs are in sync with the CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install -e "."

      - name: Regenerate the command reference
        run: python scripts/gen_docs.py

      - name: Fail if docs/commands.html is stale
        run: |
          if ! git diff --exit-code -- docs/commands.html; then
            echo "::error::docs/commands.html is out of date. Run 'python scripts/gen_docs.py' and commit the result."
            exit 1
          fi
